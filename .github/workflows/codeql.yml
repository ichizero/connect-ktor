name: codeql
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Weekly run at 09:00 UTC on Friday (18:00 JST Friday)
  schedule:
    - cron: '0 9 * * 5'
permissions:
  contents: read
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: java-kotlin
            build-mode: manual
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - if: matrix.language == 'java-kotlin'
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - if: matrix.language == 'java-kotlin' || matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "./protoc-gen-connect-ktor/go.mod"
          cache-dependency-path: "./protoc-gen-connect-ktor/go.sum"
      - if: matrix.language == 'java-kotlin'
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: matrix.language == 'java-kotlin'
        name: Build project
        run: |
          task generate
          ./gradlew --no-daemon classes testClasses

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
