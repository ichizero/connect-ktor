syntax = "proto3";

package stricteliza.v1;

import "buf/validate/validate.proto";

service StrictElizaService {
    rpc Say(SayRequest) returns (SayResponse) {
        option idempotency_level = NO_SIDE_EFFECTS;
    }

    // Upload is a client-streaming RPC used to exercise envelope-framed request bodies.
    rpc Upload(stream UploadRequest) returns (UploadResponse);
}

message SayRequest {
    string sentence = 1 [(buf.validate.field).string.max_len = 100];
    optional string name = 2 [(buf.validate.field).string.max_len = 100];
}

message SayResponse {
    string sentence = 1;
}

message UploadRequest {
    string chunk = 1;
}

message UploadResponse {
    int64 total_chars = 1;
    int64 chunk_count = 2;
}
