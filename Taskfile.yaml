# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"
includes:
  library:
    taskfile: ./library/Taskfile.yaml
    dir: ./library
  plugin:
    taskfile: ./protoc-gen-connect-ktor/Taskfile.yaml
    dir: ./protoc-gen-connect-ktor
  conformance:
    taskfile: ./conformance/Taskfile.yaml
    dir: ./conformance
tasks:
  lint:
    cmds:
      - ./gradlew spotlessCheck detekt
      - task: plugin:lint
  build:
    cmds:
      - task: plugin:build
  generate:
    aliases:
      - gen
    deps:
      - build
    cmds:
      - task: library:generate
  test:
    deps:
      - generate
    cmds:
      - ./gradlew test
      - task: plugin:test
  conformance:
    desc: Run the connectrpc conformance suite against the connect-ktor server.
    deps:
      - build
    cmds:
      - task: conformance:run
