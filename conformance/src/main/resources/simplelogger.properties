# Logging configuration for the conformance server-under-test executable.
#
# The conformance runner uses stdout to exchange size-delimited protobuf
# messages, so all log output must go to stderr (logFile=System.err).
#
# Ktor logging is bumped to DEBUG so that handler-level exceptions raised
# during a failing test case are visible when reproducing locally via
# `task conformance:run:engine ENGINE=...`. This subproject is only built
# and executed from the conformance suite, never shipped as a library.
org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.logFile=System.err
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.log.io.ktor=debug
